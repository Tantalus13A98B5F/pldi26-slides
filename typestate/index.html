<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Typestate via Revocable Capabilities @ PLDI'26</title>

  <link rel="stylesheet" href="dist/reset.css" />
  <link rel="stylesheet" href="dist/reveal.css" />
  <link rel="stylesheet" href="dist/theme/white.css" />

  <!-- Theme used for syntax highlighted code -->
  <link rel="stylesheet" href="dist/plugin/highlight/stackoverflow-light.css" />
  <link rel="stylesheet" href="dist/custom/style.css" />
</head>

<body>
  <script>
  const localPaths = {
    // mathjax: './node_modules/mathjax/tex-chtml.js',
    // mathjaxFont: './node_modules/@mathjax/mathjax-newcm-font',
    // mermaid: './node_modules/mermaid/dist/mermaid.esm.min.mjs',
    // mermaidElk: './node_modules/@mermaid-js/layout-elk/dist/mermaid-layout-elk.esm.min.mjs',
    // chartjs: './node_modules/chart.js/dist/chart.umd.min.js',
  }
  window.charts = {};
  </script>
  <div class="reveal">
    <div class="slides" data-include="slides/typestate.html"></div>
  </div>

  <script src="dist/reveal.js"></script>
  <script src="dist/plugin/notes.js"></script>
  <script src="dist/plugin/math.js"></script>
  <script src="dist/plugin/zoom.js"></script>
  <script src="dist/plugin/highlight.js"></script>
  <script src="dist/custom/reachability.js"></script>
  <script src="dist/custom/reveal-includes.js"></script>
  <script src="dist/custom/reveal-toc.js"></script>
  <script src="dist/custom/reveal-mermaid.js"></script>
  <script src="dist/custom/reveal-chartjs.js"></script>

  <script>
  // ===== Math / equations =====
  // https://docs.mathjax.org/en/v4.0/input/tex/index.html

  const mathjaxOptions = {
    mathjax: localPaths.mathjax,
    output: {
      scale: 0.8,
      fontPath: localPaths.mathjaxFont
    },
    startup: { pageReady: typesetCollectedMath },
    tex:     { macros: {
      cao:      "\\color{PaleVioletRed}",
      cer:      "\\color{red}",
      cdm:      "\\color{gray}",
      cst:      "\\color{DarkMagenta}",
      cls:      "\\color{teal}",
      rulefmt:  ["\\textsf{(#1)}", 1],
      // opening / background
      qfresh:   "{\\scriptsize♦}",
      qhole:    "\\square",
      qbot:     "\\varnothing",
      G:        "\\Gamma",
      ts:       "\\vdash",
      flt:      "\\varphi",
      baolang:  "\\lambda^*",
      weilang:  "{\\sf F}_{<:}^{\\qfresh}",
      helang:   "{\\sf A}_{<:}^{\\qfresh}",
      denglang: "{\\sf F}_{<:}^{\\circ}",
      declang:  "{\\sf G}_{<:}^{\\qfresh}",
      algolang: "{\\sf G}_{\\Leftrightarrow}^{\\qfresh}",
      efflang:  "{\\sf F}_{{\\cao\\varepsilon}<:}^{\\qfresh}",
      lrlang:   "\\lambda^\\qfresh",
      lrelang:  "\\lambda^\\qfresh_{\\cao\\varepsilon}",
      fsproto:  "{\\sf G}_{\\#}^{\\qfresh}",
      // escaping
      TUnit:    "\\textsf{Unit}",
      TInt:     "\\textsf{Int}",
      TRef:     ["\\textsf{Ref}[#1]", 1],
      tref:     ["\\textsf{ref}~#1", 1],
      mts:      "\\models",
      bbrkt:    ["⟦{#1}⟧", 1],
      Vint:     ["\\mathbb{V}\\bbrkt{#1}", 1],
      Lint:     ["\\bbrkt{#1}_{#2}", 2],
      Lintn:    ["\\Lint{#1{\\cdm\\scriptsize\\setminus\\qfresh}}{#2}", 2],
      defeq:    "\\overset{\\textsf{def}}{=}",
      VV:       "\\mathcal{V}",
      dom:      ["\\textsf{dom} {#1}", 1],
      Gint:     ["\\mathbb{G}_{#1}\\bbrkt{#2}", 2],
      ev:       "\\Downarrow",
      // algorithm
      algout:   ["{\\cao #1}", 1],
      ots:      "\\dashv",
      tinfer:   "\\Rightarrow",
      tcheck:   "\\Leftarrow",
      exp:      "\\Uparrow",
    }},
  };

  // ===== Code highlighting =====
  // https://highlightjs.readthedocs.io/en/latest/api.html

  const highlightOptions = {
    beforeHighlight(hljs) {
      hljs.registerLanguage("rt", rtLangDef);
      hljs.configure({ languages: ["rt"] });
      hljs.addPlugin(createHighlightAnnotationPlugin([
        // innermost-first: math escape first
        { regex: /\$([^$]+)\$/g,   apply: captureMathSpan },         // $tex$ inline math via MathJax
        // direct symbol translations
        { translations: {
            '|-':  '⊢',
            '==>': '⟹',
            '->':  '→',
            '~*':  '♦',
            '~0':  '∅',
            '\\u': 'μ',
            '\\E': '∃',
            '<<':  '≪',
        }},
        // scripting
        { regex: /~\{([^\}]+)\}/g, apply: makeSup },                 // ~{superscript}
        // colors
        { regex: /!!(.+?)!!/g,     apply: makeColorSpan('red') },    // !!Red Error!!
        { regex: /\?\?(.+?)\?\?/g, apply: makeColorSpan('PaleVioletRed') }, // ??Purple Output??
        //{ regex: /`([^`]+)`/g,     apply: makeColorSpan('gray') },   // `dimmed`
      ]));
    }
  }

  // ===== Reveal options =====
  // https://revealjs.com/initialization/
  // https://revealjs.com/config/

  Reveal.initialize({
view: "scroll",
    hash: true,
    controls: false,
    slideNumber: "c/t",
    navigationMode: "linear",
    width: 1440,
    height: 960,
    showNotes: false,
    totalTime: 900,
    center: false,
    margin: 0.2,
    transition: "fade",

    highlight: highlightOptions,
    mathjax4:  mathjaxOptions,
    mermaid: {
      theme: 'neutral',
      look: 'handDrawn',
      themeVariables: {
        fontSize: '16px',
      },
      sequence: {
        mirrorActors: false,
      },
      path: localPaths.mermaid,
      elkPath: localPaths.mermaidElk,
    },
    chartjs: {
      path: localPaths.chartjs,
      default: {
        font: { size: 24 },
      },
      charts: window.charts
    },

    plugins: [
      RevealIncludes,
      RevealToc,
      RevealHighlight,
      RevealZoom,
      RevealMath.MathJax4,
      RevealMermaid,
      RevealChartjs,
    ],
  }).then(() => highlightExtras('code.hl2'));
  </script>
</body>

</html>
